total_shutdown_timeout: 15s

http_server:
  port: 5003
  cors:
    allow_origins: "*"
  shutdown_context_timeout: "10s"

mongo:
  mongo_instances:
    - host: bb-mongo1
      port: 27017
    - host: bb-mongo2
      port: 27017
    - host: bb-mongo3
      port: 27017
  user: mongodb
  name: BB-game
  connect_timeout: 30s
  disconnect_timeout: 5s
  replication_name: "rs0"

broker:
  host: "kafka"
  port: "9092"

repository:
  questions_timeout: 1h
  game_status_timeout: 1h
  valid_answer_timeout: 2m2s
  score:
    base_score: 5
    max_bonus: 10
    bonus_deadline: 115s

task_publisher:
  redis_config:
    host: localhost
    port: 6379

task_worker:
  redis_config:
    host: localhost
    port: 6379

service:
  store_game_status_time_out: 1m
  publish_user_to_waiting_list_time_out: 1m
  question_interval: 15s

redis:
  host: localhost
  Port: 6379

logger:
  file_path: "logs/game/service.log"
  use_local_time: true
  file_max_size_in_mb: 10
  file_max_age_in_days: 7